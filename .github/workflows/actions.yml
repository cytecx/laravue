name: Build

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ovhcloud-v1

    steps:
      - name: Pull Latest Code
        run: git -C /var/www/laravue pull --ff-only || true

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install npm Dependencies
        run: npm ci

      - name: Build
        run: npm run build
