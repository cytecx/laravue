name: Build

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ovhcloud-v1
    defaults:
      run:
        working-directory: /var/www/laravue

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Apache folder
        run: |
          sudo rsync -av --delete ./ /var/www/laravue/

      - name: Update server permissions
        run: |
          sudo chown -R "$(id -un)":"$(id -gn)" /var/www/laravue

      # - name: Setup PHP
      #   uses: shivammathur/setup-php@v2
      #   with:
      #     php-version: "8.3"

      # - name: Git pull
      #   run: git pull

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      # - name: Setup Node.js
      #   uses: actions/setup-node@v3
      #   with:
      #     node-version: "22"

      - name: Install npm Dependencies
        run: npm ci

      - name: Build
        run: npm run build
