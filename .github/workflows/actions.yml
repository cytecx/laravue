name: Build & Deploy

on:
  push:
    branches: [main, master]

jobs:
  Deploy:
    runs-on: ovhcloud-v1
    steps:
      - name: Pull Latest Code
        run: |
          cd /var/www/laravue
          git pull origin ${{ github.ref_name }}

      - name: Install Composer Dependencies
        run: |
          cd /var/www/laravue
          composer install --optimize-autoloader

      - name: Install NPM Dependencies
        run: |
          cd /var/www/laravue
          npm ci
          npm run build

      - name: Update Permissions
        run: |
          cd /var/www/laravue
          sudo chown -R ubuntu:www-data /var/www/laravue/storage /var/www/laravue/bootstrap/cache
          sudo chmod -R 775 /var/www/laravue/storage /var/www/laravue/bootstrap/cache

  Optimization:
    runs-on: ovhcloud-v1
    needs: Deploy
    steps:
      - name: Optimize
        run: |
          cd /var/www/laravue
          php artisan optimize:clear

      - name: Cache Configurations
        run: |
          cd /var/www/laravue
          php artisan config:cache

      - name: Cache Routes
        run: |
          cd /var/www/laravue
          php artisan route:cache

      - name: Cache Views
        run: |
          cd /var/www/laravue
          php artisan view:cache
