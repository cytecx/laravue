name: Build & Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_migration:
        description: "Run database migrations"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  Deploy:
    runs-on: ovhcloud-v1
    steps:
      - name: Pull Latest Code
        run: |
          cd /var/www/laravue
          git pull origin ${{ github.ref_name }}

      - name: Install Composer Dependencies
        run: |
          cd /var/www/laravue
          composer install --no-dev --optimize-autoloader

      - name: Install NPM Dependencies
        run: |
          cd /var/www/laravue
          npm ci
          npm run build

      - name: Update Permissions
        run: |
          cd /var/www/laravue
          sudo chown -R ubuntu:www-data /var/www/laravue/storage /var/www/laravue/bootstrap/cache
          sudo chmod -R 775 /var/www/laravue/storage /var/www/laravue/bootstrap/cache

  Migration:
    runs-on: ovhcloud-v1
    needs: Deploy
    if: ${{ github.event.inputs.run_migration == 'true' }}
    steps:
      - name: Run Database Migrations
        run: |
          cd /var/www/laravue
          php artisan migrate --force

  Optimization:
    runs-on: ovhcloud-v1
    needs: Migration
    steps:
      - name: Optimize
        run: |
          cd /var/www/laravue
          php artisan optimize:clear

      - name: Cache Configurations
        run: |
          cd /var/www/laravue
          php artisan config:cache

      - name: Cache Routes
        run: |
          cd /var/www/laravue
          php artisan route:cache

      - name: Cache Views
        run: |
          cd /var/www/laravue
          php artisan view:cache
