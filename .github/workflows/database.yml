name: Database Operations

on:
  workflow_dispatch:
    inputs:
      run_migration:
        description: "Run Database Migrations"
        required: false
        default: false
        type: boolean
      run_seeder:
        description: "Run Database Seeders"
        required: false
        default: false
        type: boolean
      seeder_mode:
        description: "Seeder Mode"
        required: false
        default: Normal
        type: choice
        options: [Normal, Fresh]

jobs:
  Migration:
    runs-on: ovhcloud-v1
    steps:
      - name: Migrate Database
        if: ${{ github.event.inputs.run_migration == 'true' }}
        run: |
          cd /var/www/laravue
          php artisan migrate --force

  Seeder:
    runs-on: ovhcloud-v1
    if: ${{ github.event.inputs.run_seeder == 'true' }}
    steps:
      - name: Run Seeder
        run: |
          cd /var/www/laravue
          if [ "${{ github.event.inputs.seeder_mode }}" = "Fresh" ]; then
            php artisan migrate:refresh --seed --force
          else
            php artisan db:seed --force
          fi