name: Build & Deploy

on:
  push:
    branches: [main, master]

jobs:
  Deploy:
    runs-on: ovhcloud-v1
    steps:
      - name: Pull Latest Code
        run: |
          cd "${{ vars.APP_PATH }}"
          git pull origin ${{ github.ref_name }}

      - name: Install Composer Dependencies
        run: |
          cd "${{ vars.APP_PATH }}"
          composer install --optimize-autoloader

      - name: Install NPM Dependencies
        run: |
          cd "${{ vars.APP_PATH }}"
          npm ci
          npm run build

      - name: Update Permissions
        run: |
          cd "${{ vars.APP_PATH }}"
          sudo chown -R ubuntu:www-data "${{ vars.APP_PATH }}/storage" "${{ vars.APP_PATH }}/bootstrap/cache"
          sudo chmod -R 775 "${{ vars.APP_PATH }}/storage" "${{ vars.APP_PATH }}/bootstrap/cache"

  Optimization:
    runs-on: ovhcloud-v1
    needs: Deploy
    steps:
      - name: Optimize
        run: |
          cd "${{ vars.APP_PATH }}"
          php artisan optimize:clear

      - name: Cache Configurations
        run: |
          cd "${{ vars.APP_PATH }}"
          php artisan config:cache

      - name: Cache Routes
        run: |
          cd "${{ vars.APP_PATH }}"
          php artisan route:cache

      - name: Cache Views
        run: |
          cd "${{ vars.APP_PATH }}"
          php artisan view:cache
