name: Database Operations

on:
  workflow_dispatch:
    inputs:
      run_migration:
        description: "Run Database Migrations"
        required: false
        default: false
        type: boolean
      seeder_type:
        description: "Run Database Seeders"
        required: false
        default: None
        type: choice
        options: [None, Fresh, Normal, User, Listing]

jobs:
  Migration:
    runs-on: ovhcloud-v1
    steps:
      - name: Migrate Database
        if: ${{ github.event.inputs.run_migration == 'true' }}
        run: |
          cd "${{ vars.APP_PATH }}"
          php artisan migrate --force

  Seeder:
    runs-on: ovhcloud-v1
    if: ${{ github.event.inputs.seeder_type != 'None' }}
    steps:
      - name: Run Seeder
        run: |
          cd "${{ vars.APP_PATH }}"
          case "${{ github.event.inputs.seeder_type }}" in
            Fresh)
              php artisan migrate:refresh --seed --force
              ;;
            Normal)
              php artisan db:seed --force
              ;;
            User)
              php artisan db:seed --class=UserSeeder --force
              ;;
            Listing)
              php artisan db:seed --class=ListingSeeder --force
              ;;
            *)
              echo "No valid seeder_type provided"
              ;;
          esac
