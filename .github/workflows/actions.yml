name: Build & Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_migration:
        description: "Run Database Migrations"
        required: false
        default: false
        type: boolean
      run_seeder:
        description: "Run Database Seeders"
        required: false
        default: false
        type: boolean
      seeder_mode:
        description: "Seeder mode"
        required: false
        default: "Normal"
        type: choice
        options:
          - Normal
          - Fresh

jobs:
  Deploy:
    runs-on: ovhcloud-v1
    if: github.event_name == 'push'
    steps:
      - name: Pull Latest Code
        run: |
          cd /var/www/laravue
          git pull origin ${{ github.ref_name }}

      - name: Install Composer Dependencies
        run: |
          cd /var/www/laravue
          composer install --optimize-autoloader

      - name: Install NPM Dependencies
        run: |
          cd /var/www/laravue
          npm ci
          npm run build

      - name: Update Permissions
        run: |
          cd /var/www/laravue
          sudo chown -R ubuntu:www-data /var/www/laravue/storage /var/www/laravue/bootstrap/cache
          sudo chmod -R 775 /var/www/laravue/storage /var/www/laravue/bootstrap/cache

  Optimization:
    runs-on: ovhcloud-v1
    needs: Deploy
    if: github.event_name == 'push'
    steps:
      - name: Optimize
        run: |
          cd /var/www/laravue
          php artisan optimize:clear

      - name: Cache Configurations
        run: |
          cd /var/www/laravue
          php artisan config:cache

      - name: Cache Routes
        run: |
          cd /var/www/laravue
          php artisan route:cache

      - name: Cache Views
        run: |
          cd /var/www/laravue
          php artisan view:cache

  Migration:
    runs-on: ovhcloud-v1
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_migration == 'true'
    steps:
      - name: Run Database Migrations
        run: |
          cd /var/www/laravue
          php artisan migrate --force

  Seeder:
    runs-on: ovhcloud-v1
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_seeder == 'true'
    steps:
      - name: Run Database Seeders
        run: |
          cd /var/www/laravue
          if [ "${{ github.event.inputs.seeder_mode }}" = "Fresh" ]; then
            php artisan migrate:refresh --seed --force
          else
            php artisan db:seed --force
          fi
