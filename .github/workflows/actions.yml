name: Build

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ovhcloud-v1

    steps:
      - name: Pull Latest Code
        run: git -C /var/www/laravue pull --ff-only || true

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install npm Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Apache folder
        run: |
          sudo rsync -av --delete \
            --exclude=".env" \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude="storage" \
            --exclude="bootstrap/cache" \
            ./ /var/www/laravue/

            cd /var/www/laravue

      - name: Update Permissions
        run: sudo chown -R ubuntu:ubuntu /var/www/laravue/storage /var/www/laravue/bootstrap/cache && sudo chmod -R 777 /var/www/laravue/storage /var/www/laravue/bootstrap/cache
