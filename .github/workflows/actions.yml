name: Build & Deploy

on:
  push:
    branches: [main, master]

jobs:
  Deploy:
    runs-on: ovhcloud-v1

    steps:
      - name: Pull Latest Code
        run: |
          cd /var/www/laravue
          git pull origin ${{ github.ref_name }}

      - name: Install Composer Dependencies
        run: |
          cd /var/www/laravue
          composer install --no-dev --optimize-autoloader

      - name: Install NPM Dependencies
        run: |
          cd /var/www/laravue
          npm ci
          npm run build

      - name: Update Permissions
        run: |
          cd /var/www/laravue
          sudo chown -R ubuntu:www-data /var/www/laravue/storage /var/www/laravue/bootstrap/cache
          sudo chmod -R 775 /var/www/laravue/storage /var/www/laravue/bootstrap/cache

  Migration:
    runs-on: ovhcloud-v1
    needs: Deploy

    steps:
      - name: Run Database Migrations
        run: |
          cd /var/www/laravue
          php artisan migrate --force